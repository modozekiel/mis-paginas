<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modo Zekiel - Mis Canales</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial Black', sans-serif;
      background: url('https://raw.githubusercontent.com/modozekiel/mis-paginas/main/49.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      margin-top: 60px;
      color: #ff1c1c;
      text-shadow: 3px 3px 10px #000;
    }
    .links {
      margin-top: 50px;
    }
    .link {
      display: block;
      margin: 20px auto;
      padding: 15px 25px;
      width: 320px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.3em;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
    }
    .youtube { background: #ff0000; color: #fff; }
    .tiktok { background: #000; color: #fff; }
    .instagram { background: #e1306c; color: #fff; }
    .facebook { background: #1877f2; color: #fff; }
    .link:hover { transform: scale(1.1); opacity: 0.9; }
  </style>
</head>
<body>
  <h1>🔥 Modo Zekiel 🔥</h1>
  <div class="links">
    <a class="link youtube" href="https://www.youtube.com/@modo_zekiel" target="_blank">🎥 YouTube</a>
    <a class="link tiktok" href="https://www.tiktok.com/@modo_zekiel?is_from_webapp=1&sender_device=pc" target="_blank">📱 TikTok</a>
    <a class="link instagram" href="https://www.instagram.com/modozekiel/" target="_blank">📸 Instagram</a>
    <a class="link facebook" href="https://www.facebook.com/profile.php?id=61585318784152" target="_blank">📘 Facebook</a>
  </div>
</body>
</html>
