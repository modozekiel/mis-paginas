    body {

      padding: 0;
      font-family: 'Creepster', cursive;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    /* Video de fondo */
    #videoFondo {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.4) contrast(1.3) saturate(1.2);
    }

    h1 {
      font-size: 4em;
      margin-top: 80px;
      color: #ff1c1c;
      text-shadow: 0 0 25px #ff0000, 0 0 50px #000;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {opacity: 1;}
      20%, 24%, 55% {opacity: 0.6;}
    }

    .links {
      margin-top: 60px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 25px auto;
      padding: 18px 30px;
      width: 380px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.3em;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 25px rgba(0,0,0,0.9);
      animation: pulse 4s infinite;
    }

    @keyframes pulse {
      0% {box-shadow: 0 0 10px #000;}
      50% {box-shadow: 0 0 25px #ff0000;}
      100% {box-shadow: 0 0 10px #000;}
    }

    .youtube { background: linear-gradient(145deg, #660000, #ff0000); color: #fff; }
    .tiktok { background: linear-gradient(145deg, #000, #222); color: #fff; }
    .instagram { background: linear-gradient(145deg, #33001b, #e1306c); color: #fff; }
    .facebook { background: linear-gradient(145deg, #001f4d, #1877f2); color: #fff; }

    .link:hover {
      transform: scale(1.1) rotate(-2deg);
      opacity: 0.9;
      filter: drop-shadow(0 0 20px #ff0000);
    }

    svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
    }

    .desc {
      font-size: 0.9em;
      color: #ccc;
      margin-top: 5px;
      text-shadow: 0 0 10px #000;
    }
